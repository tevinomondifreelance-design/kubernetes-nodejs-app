apiVersion: apps/v1
kind: Deployment

metadata:
  name: nodejs-deployment
  namespace: nodejs

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nodejs-app

  template:
    metadata:
      labels:
        app: nodejs-app

    spec:
      containers:
      - name: nodejs-container
        image: tevinportfolio/kubernetes-nodejs-app:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        envFrom:
        - configMapRef:
            name: nodejs-config